<!DOCTYPE html>
<html lang="pt_br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServTask</title>
    <link rel="icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#03a9f4">

    <!-- iOS Support -->
    <link rel="apple-touch-icon" href="img/icon-192x192.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="#03a9f4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ServTask">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
        crossorigin="anonymous" />
</head>

<body>

    <div id="app" class="list">

        <div class="list-header">
            <div class="header-main">
                <select id="currentListSelect"></select>
                <div class="header-actions">
                    <button id="themeToggle" title="Alternar Tema">
                        <i class="fa fa-moon" aria-hidden="true"></i>
                    </button>
                    <button id="addNewList" title="Nova Lista">
                        <i class="fa fa-plus-circle" aria-hidden="true"></i>
                    </button>
                    <button id="deleteList" class="bg-red" title="Deletar Lista">
                        <i class="fa fa-trash" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>

        <h2 id="listTitle">Minhas tarefas</h2>

        <div class="list-content">
            <ul id="todoList">
            </ul>
        </div>

        <div class="addTodo">

            <input type="text" placeholder="Informe sua tarefa">

            <!-- <button id="addSeparator" title="Adicionar Separador">
                <i class="fa fa-minus" aria-hidden="true"></i>
            </button> -->

            <button id="addTask">
                <span><i class="fa fa-plus" aria-hidden="true"></i></span>
            </button>

        </div>

                <div class="footer">
    <button id="erase" class="footer-button bg-red">
        <i class="fa fa-trash" aria-hidden="true"></i>
        <span>Limpar Lista</span>
    </button>
    <span class="footer-brand">ServTask by ServCkick</span>
</div>

    </div>

    <script src="todos.js"></script>

</body>

</html>
