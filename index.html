<!DOCTYPE html>
<html lang="pt_br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do</title>
    <link rel="icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#03a9f4">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
        integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog=="
        crossorigin="anonymous" />
</head>

<body>

    <div id="app" class="list">

        <div class="list-header">
            <select id="currentListSelect"></select>
            <button id="addNewList">
                <i class="fa fa-plus-circle" aria-hidden="true"></i>
            </button>
            <button id="deleteList" class="bg-red">
                <i class="fa fa-trash" aria-hidden="true"></i>
            </button>
        </div>

        <h2 id="listTitle">Minha Lista</h2>

        <ul>

        </ul>

        <div class="addTodo">

            <input type="text" placeholder="Infome sua tarefa">

            <button>
                <span><i class="fa fa-plus" aria-hidden="true"></i></span>
            </button>

        </div>

        <div class="footer">
            <div class="options">
                <div class="option-item">
                    <button id="erase" class="footer-button bg-red">
                        <span><i class="fa fa-trash" aria-hidden="true"></i></span>
                    </button>
                    <!-- <p>Apagar tudo</p> -->
                </div>
                <!-- <div class="option-item">
                    <button id="remove-selected" class="footer-button">
                        <span><i class="fa fa-trash" aria-hidden="true"></i></span>
                    </button> -->
                <!-- <p>Apagar selecionados</p> -->
                <!-- </div> -->
            </div>

        </div>

    </div>

    <script src="todos.js"></script>

</body>

</html>
